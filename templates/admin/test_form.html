<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Admin - {{ 'Edit' if test else 'Create' }} Test</title>
<link rel="stylesheet" href="/css/bootstrap.min.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; }
.admin-layout { display: flex; min-height: 100vh; }
.sidebar { width: 240px; background: #1a1a2e; color: #eee; padding: 20px 0; flex-shrink: 0; }
.sidebar h3 { padding: 0 20px 20px; font-size: 1.1rem; color: #fff; border-bottom: 1px solid #333; margin-bottom: 10px; }
.sidebar a { display: block; padding: 10px 20px; color: #aaa; text-decoration: none; font-size: .9rem; }
.sidebar a:hover, .sidebar a.active { color: #fff; background: #16213e; }
.main { flex:1; padding: 30px; max-width: 800px; }
.card { background: #fff; border-radius: 8px; padding: 25px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
label { display: block; margin: 12px 0 4px; font-weight: 600; font-size: .9rem; }
input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: .9rem; }
.btn-primary { background: #4361ee; color: #fff; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
.btn-secondary { background: #6c757d; color: #fff; padding: 10px 20px; border: none; border-radius: 4px; text-decoration: none; display: inline-block; margin-left: 8px; }
</style>
</head>
<body>
<div class="admin-layout">
<div class="sidebar">
    <h3>IELTS Admin</h3>
    <a href="/admin">Dashboard</a>
    <a href="/admin/tests" class="active">Tests</a>
    <a href="/admin/answers">Answer Keys</a>
    <a href="/admin/users">Users</a>
    <a href="/board" style="margin-top:20px; border-top:1px solid #333; padding-top:15px;">← Frontend</a>
</div>
<div class="main">
    <h2>{{ 'Edit' if test else 'Create' }} Test</h2>
    <div class="card">
        <form method="POST">
            <label>Title</label>
            <input name="title" value="{{ test.title if test else '' }}" required>
            <label>Slug</label>
            <input name="slug" value="{{ test.slug if test else '' }}" required placeholder="e.g. listening-1">
            <label>Type</label>
            <select name="test_type">
                <option value="listening" {{ 'selected' if test and test.test_type=='listening' }}>Listening</option>
                <option value="reading" {{ 'selected' if test and test.test_type=='reading' }}>Reading</option>
                <option value="writing" {{ 'selected' if test and test.test_type=='writing' }}>Writing</option>
            </select>
            <label>Duration (minutes)</label>
            <input name="duration_minutes" type="number" value="{{ test.duration_minutes if test else 30 }}">
            <label>Has Audio</label>
            <select name="has_audio">
                <option value="0" {{ 'selected' if test and not test.has_audio }}>No</option>
                <option value="1" {{ 'selected' if test and test.has_audio }}>Yes</option>
            </select>
            <label>Audio Source Path</label>
            <input name="audio_src" value="{{ test.audio_src if test else '/static/audio/listening.mp3' }}">
            <label>Instructions (HTML)</label>
            <textarea name="instructions_top" rows="4">{{ test.instructions_top if test else '' }}</textarea>
            <div style="margin-top:20px;">
                <button type="submit" class="btn-primary">{{ 'Update' if test else 'Create' }}</button>
                <a href="/admin/tests" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div>
</body>
</html>
