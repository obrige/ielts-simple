<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Results - IELTS</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="/css/gel.css"/>
    <style>
        body { background: #f5f5f5; }
        .results-container { max-width: 600px; margin: 60px auto; padding: 30px; }
        .score-card { background: #fff; border-radius: 8px; padding: 25px; margin: 15px 0; box-shadow: 0 2px 10px rgba(0,0,0,.1); text-align: center; }
        .score-circle { width: 120px; height: 120px; border-radius: 50%; border: 8px solid #1a237e; display: inline-flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; color: #1a237e; margin: 15px; }
    </style>
</head>
<body>
<div class="results-container">
    <h2 class="text-center mb-4">Test Results</h2>
    <div class="score-card">
        <h4>Listening</h4>
        <div class="score-circle"><span class="listening-percent">--</span>%</div>
    </div>
    <div class="score-card">
        <h4>Reading</h4>
        <div class="score-circle"><span class="reading-percent">--</span>%</div>
    </div>
    <div class="text-center mt-4">
        <p class="text-muted">Writing results require manual grading.</p>
        <a href="/board" class="btn btn-primary">Try Again</a>
    </div>
</div>
<script src="/js/lib/jquery-3.6.0.min.js"></script>
<script src="/js/gel/results.js"></script>
<script>
{% if token %}
var token = "{{ token }}";
try {
  var scores = JSON.parse(atob(token));
  $(".listening-percent").text(Math.round(scores.l || 0));
  $(".reading-percent").text(Math.round(scores.r || 0));
} catch(e) {}
{% endif %}
</script>
</body>
</html>
