<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>IELTS - Login</title>
<link rel="stylesheet" href="/css/bootstrap.min.css"/>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
.card { background: #fff; border-radius: 12px; padding: 40px; box-shadow: 0 4px 12px rgba(0,0,0,.1); width: 100%; max-width: 420px; text-align: center; }
h2 { margin-bottom: 8px; color: #1a1a2e; }
.sub { color: #666; margin-bottom: 24px; font-size: .9rem; }
input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; text-align: center; margin-bottom: 16px; }
.btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
.btn-primary { background: #4361ee; color: #fff; }
.btn-primary:hover { background: #3451d1; }
.error { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 6px; margin-bottom: 16px; }
.link { color: #4361ee; text-decoration: none; font-size: .9rem; }
.link:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
    <h2>IELTS Training</h2>
    <p class="sub">Enter your User ID to continue</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST" action="/login">
        <input name="user_id" type="number" placeholder="Your User ID" required autofocus>
        <button type="submit" class="btn btn-primary">Log In</button>
    </form>
    <p style="margin-top:20px;"><a href="/register" class="link">New user? Register here</a></p>
</div>
</body>
</html>
